name: listeparty_app
description: Liste Party — application mobile de réservation de soirées.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  webview_flutter: ^4.10.0
  url_launcher: ^6.3.1
  mobile_scanner: ^6.0.2
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/

# Configuration de l'icône d'application (générée à partir de assets/ios.png)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/ios.png"
  # Pour Android, si assets/ios.png contient de la transparence, un fond plein
  # évite un rendu bizarre sur les launchers qui n'aiment pas la transparence :
  # adaptive_icon_background: "#0C0C0C"
  # adaptive_icon_foreground: "assets/ios.png"
  remove_alpha_ios: true   # Apple refuse la transparence sur l'icône iOS